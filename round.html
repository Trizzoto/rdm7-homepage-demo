<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RDM Round — OIL Demo</title>
  <meta name="theme-color" content="#000" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    /* Canvas fills the stage, clipped to a circle by the parent liquid section */
    canvas {
      display: block;
      width: 100%; height: 100%;
      image-rendering: pixelated;
      touch-action: none;
    }
    .loading {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: #000;
      color: #5a5a60;
      font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 350ms ease;
      pointer-events: none;
    }
    .loading.hidden { opacity: 0; }
    .loading .ring {
      width: 28px; height: 28px;
      border: 2px solid #2a2a30; border-top-color: #e8e8ea;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    .loading .col { display: grid; place-items: center; gap: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .gate {
      position: absolute; inset: 0;
      display: none; place-items: center;
      background: rgba(0,0,0,0.65);
      cursor: pointer; z-index: 10;
    }
    .gate.visible { display: grid; }
    .gate-play {
      width: 84px; height: 84px;
      border-radius: 50%; background: #fff;
      display: grid; place-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 40px rgba(204,0,0,0.35);
      transition: transform 200ms ease;
    }
    .gate-play svg { width: 32px; height: 32px; fill: #0c0c0d; }
    .gate:hover .gate-play { transform: scale(1.06); }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="dash" width="720" height="720"></canvas>
    <div class="loading" id="loading">
      <div class="col"><div class="ring"></div><div>Loading</div></div>
    </div>
    <div class="gate" id="gate">
      <div class="gate-play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
  </div>

  <script>
    const SCENE_DASHBOARD = 6;
    const params   = new URLSearchParams(window.location.search);
    const useGate  = params.get('gate') === '1';
    const canvas   = document.getElementById('dash');
    const loading  = document.getElementById('loading');
    const gate     = document.getElementById('gate');

    let module = null;
    let rafId  = 0;

    async function loadWasm() {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = './rdm7-sandbox-round.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load rdm7-sandbox-round.js'));
        document.head.appendChild(s);
      });

      const factory = window.RDM7Sandbox;
      if (!factory) throw new Error('RDM7Sandbox factory missing on window');

      module = await factory({
        canvas,
        locateFile: (path) => path.replace('rdm7-sandbox.wasm', 'rdm7-sandbox-round.wasm'),
        print:    () => {},
        printErr: () => {},
      });

      if (module._sandbox_set_scene) module._sandbox_set_scene(SCENE_DASHBOARD);

      /* Oil-gauge drive cycle.
       * MAP  → oil pressure (0-300 PSI) — left meter
       * RPM  → oil temp (0-120 °C)      — right meter  */
      try {
        const inject = module.cwrap('sandbox_inject_signal', null, ['string', 'number']);
        const t0 = performance.now();

        function step() {
          const ms = performance.now() - t0;
          const wave = (c, amp, period, phase) =>
            c + amp * Math.sin(((ms - phase) / period) * 2 * Math.PI);

          inject('MAP', wave(65,  30, 4000, 0));      // oil pressure 35-95 PSI
          inject('RPM', wave(92,   8, 8000, 1500));   // oil temp     84-100 °C
        }
        setInterval(step, 60);
        step();
      } catch (err) {
        console.warn('oil drive cycle failed:', err);
      }

      const tick = () => {
        if (module && module._sandbox_step) module._sandbox_step();
        rafId = requestAnimationFrame(tick);
      };
      rafId = requestAnimationFrame(tick);
      loading.classList.add('hidden');
    }

    function forwardPointer(ev, pressed) {
      if (!module || !module._sandbox_set_pointer) return;
      const rect = canvas.getBoundingClientRect();
      const x = ((ev.clientX - rect.left) * canvas.width)  / rect.width;
      const y = ((ev.clientY - rect.top)  * canvas.height) / rect.height;
      module._sandbox_set_pointer(Math.round(x), Math.round(y), pressed);
    }
    canvas.addEventListener('pointerdown', (e) => { canvas.setPointerCapture(e.pointerId); forwardPointer(e, 1); e.preventDefault(); });
    canvas.addEventListener('pointermove', (e) => { if (e.buttons || e.pointerType === 'touch') forwardPointer(e, 1); });
    canvas.addEventListener('pointerup',   (e) => { forwardPointer(e, 0); try { canvas.releasePointerCapture(e.pointerId); } catch(_){} e.preventDefault(); });
    canvas.addEventListener('pointercancel', (e) => forwardPointer(e, 0));
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); }
      else if (module) {
        const tick = () => { if (module._sandbox_step) module._sandbox_step(); rafId = requestAnimationFrame(tick); };
        rafId = requestAnimationFrame(tick);
      }
    });

    if (useGate) {
      gate.classList.add('visible');
      gate.addEventListener('click', () => {
        gate.classList.remove('visible');
        loadWasm().catch((err) => { loading.querySelector('.col').innerHTML = '<div>Demo unavailable</div>'; console.error(err); });
      }, { once: true });
    } else {
      loadWasm().catch((err) => { loading.querySelector('.col').innerHTML = '<div>Demo unavailable</div>'; console.error(err); });
    }
  </script>
</body>
</html>
