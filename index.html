<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RDM-7 Dash — Live Demo</title>
  <meta name="description" content="Interactive in-browser demo of the RDM-7 Dash running its default layout." />

  <!-- Hint to the parent Shopify page that this iframe is happy to be scaled -->
  <meta name="theme-color" content="#0c0c0d" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;       /* let the Shopify page show through */
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;    /* kill iOS double-tap zoom on dash */
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Stage: centers + scales the bezel to fit the iframe ───────────── */
    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    /* ── Bare mode (?bare=1) ─────────────────────────────────────────────
     * Used when the demo is embedded inside another page's bezel (e.g.
     * the Shopify hero). Strips our own bezel chrome so it doesn't
     * double up.
     *
     * Sizing model: the .screen container is forced to a strict 5:3
     * aspect ratio sized to be the largest box that fits inside the
     * iframe — so the canvas (which fills .screen 100%×100%) is ALWAYS
     * fully visible whatever the host iframe dimensions are. The iframe
     * may be wider OR taller than 5:3 and the screen just centers with
     * black margins, never clips. */
    body.bare .stage {
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.bare .bezel {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      transform: none;
      /* Aspect-ratio + max-width/max-height = "largest 5:3 box that
       * fits inside the iframe". Browser picks the constraint that
       * binds first (width or height) and the other axis auto-sizes. */
      aspect-ratio: 800 / 480;
      width: 100%;
    }
    body.bare .bezel::after { display: none; }
    body.bare .screen {
      width: 100%;
      height: 100%;
      border-radius: 0;
      box-shadow: none;
      aspect-ratio: 800 / 480;
    }
    body.bare canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    body.bare .loading { background: #000; }

    /* ── Bezel: the dashboard housing around the 800×480 LCD ────────────
     * Outer plastic frame in matte black; subtle highlight on top edge to
     * suggest a moulded part. Inner shadow at the screen border so the
     * LCD reads as inset rather than painted on. */
    .bezel {
      /* Native size — gets scaled with transform to fit. The 800×480 LCD
         plus 30px bezel on each side = 860×540. */
      width: 860px;
      height: 540px;

      background: linear-gradient(180deg, #1a1a1c 0%, #0c0c0d 100%);
      border-radius: 22px;
      padding: 30px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 24px 60px -20px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      position: relative;

      /* Scale-to-fit: GPU-accelerated transform, native LCD pixels stay
         crisp because the canvas is rendered at 800×480 internally. */
      transform-origin: center center;
    }

    /* Tiny brand mark in the lower bezel — keeps the demo recognisably
     * the product without dominating the frame. */
    .bezel::after {
      content: "RDM-7";
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    /* ── Screen: the LCD itself — 800×480 at native pixel size ───────── */
    .screen {
      width: 800px;
      height: 480px;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.8);
    }

    /* Canvas the WASM SDL2 driver writes pixels to. Sized to native
     * resolution so every dashboard pixel is crisp. */
    canvas {
      display: block;
      width: 800px;
      height: 480px;
      image-rendering: pixelated;   /* no smoothing — matches the device */
      touch-action: none;           /* we forward raw pointer events */
    }

    /* ── Loading state ─────────────────────────────────────────────────
     * Static placeholder shown while the 2 MB WASM downloads + boots.
     * Faded in/out via opacity so there's no jarring flash on swap. */
    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
      color: #5a5a60;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 350ms ease;
      pointer-events: none;
    }
    .loading.hidden { opacity: 0; }
    .loading .ring {
      width: 28px;
      height: 28px;
      border: 2px solid #2a2a30;
      border-top-color: #e8e8ea;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    .loading .col {
      display: grid;
      place-items: center;
      gap: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── First-tap-to-start gate (mobile only) ─────────────────────────
     * Some mobile browsers (iOS Safari) gate audio/video/wasm-stream
     * initialisation on a user gesture. The dash itself works fine
     * without a gesture, but if the parent page wants to keep mobile
     * data usage lean we expose a `?gate=1` query param that hides the
     * canvas behind a "Tap to start" overlay until the user opts in.
     * Default: no gate, WASM loads immediately on page open. */
    .gate {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.92);
      color: #e8e8ea;
      cursor: pointer;
      z-index: 10;
    }
    .gate.visible { display: grid; }
    .gate-inner {
      display: grid;
      place-items: center;
      gap: 10px;
      text-align: center;
      padding: 0 20px;
    }
    .gate-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .gate-sub {
      font-size: 12px;
      color: #8a8a90;
      letter-spacing: 0.08em;
    }
    .gate-play {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      margin-bottom: 6px;
    }
    .gate-play svg { width: 22px; height: 22px; fill: #0c0c0d; }

    /* ── Minimal gate (?minimal=1) ───────────────────────────────────────
     * Drops the "Tap to start / Loads ~2 MB" copy and shows only an
     * enlarged play button in the centre. Used in the Round teaser
     * porthole where the surrounding section copy already explains
     * what the visitor is about to do. */
    body.minimal .gate-title,
    body.minimal .gate-sub { display: none; }
    body.minimal .gate-inner { gap: 0; }
    body.minimal .gate-play {
      width: 84px;
      height: 84px;
      margin: 0;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08),
                  0 0 40px rgba(204, 0, 0, 0.35);
      transition: transform 200ms ease;
    }
    body.minimal .gate-play svg { width: 32px; height: 32px; }
    body.minimal .gate:hover .gate-play { transform: scale(1.06); }
    body.minimal .gate {
      /* Slightly more translucent so the dash placeholder peeks through
       * — feels less like a blocker, more like an invitation. */
      background: rgba(0, 0, 0, 0.65);
    }

    /* ── Responsive scaling ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .bezel { transform: scale(0.75); }
    }
    @media (max-width: 700px) {
      .bezel { transform: scale(0.6); }
    }
    @media (max-width: 540px) {
      .bezel { transform: scale(0.48); }
    }
    @media (max-width: 420px) {
      .bezel { transform: scale(0.38); }
    }

    /* Reduce-motion users get a static screen — no spinner */
    @media (prefers-reduced-motion: reduce) {
      .loading .ring { animation: none; border-top-color: #2a2a30; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bezel" id="bezel">
      <div class="screen">
        <canvas id="dash" width="800" height="480"></canvas>

        <div class="loading" id="loading">
          <div class="col">
            <div class="ring"></div>
            <div>Loading dash demo</div>
          </div>
        </div>

        <div class="gate" id="gate">
          <div class="gate-inner">
            <div class="gate-play">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="gate-title">Tap to start</div>
            <div class="gate-sub">Loads ~2 MB · runs locally in your browser</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Config ────────────────────────────────────────────────────────
     * Scene 6 = SCENE_DASHBOARD ("driving" with synthetic data).
     * The wizard sandbox starts at scene 0 (CAN scan); we jump straight
     * to the dashboard so the homepage demo is product-on-arrival. */
    const SCENE_DASHBOARD = 6;

    /* ?gate=1 in the iframe src enables the tap-to-start overlay. Default
     * is gate-off because most desktops are happy to autoload, and on
     * mobile the iframe is usually lazy-loaded by Shopify anyway.
     *
     * ?bare=1 strips the demo's own bezel + brand label — used when
     * embedding inside another page's bezel so we don't double up. */
    const params = new URLSearchParams(window.location.search);
    const useGate = params.get('gate') === '1';
    const bare    = params.get('bare') === '1';
    const minimal = params.get('minimal') === '1';
    if (bare)    document.body.classList.add('bare');
    if (minimal) document.body.classList.add('minimal');

    const canvas  = document.getElementById('dash');
    const loading = document.getElementById('loading');
    const gate    = document.getElementById('gate');

    /* ── WASM bootstrap ─────────────────────────────────────────────── */
    let module = null;
    let rafId  = 0;

    async function loadWasm() {
      /* Inject the Emscripten module-script. It self-registers on
       * window.RDM7Sandbox (set via EXPORT_NAME in the sandbox build). */
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = './rdm7-sandbox.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load rdm7-sandbox.js'));
        document.head.appendChild(s);
      });

      const factory = window.RDM7Sandbox;
      if (!factory) throw new Error('RDM7Sandbox factory missing on window');

      /* Fetch the dash logo BEFORE booting the WASM. The default layout
       * is built during wizard_sandbox_start() which runs inside main(),
       * so the image must exist in the in-memory FS before main() runs —
       * otherwise the image widget gives up and shows grey placeholder
       * text. preRun is the Emscripten hook that runs synchronously
       * before main(). */
      /* Pre-fetch assets in parallel. The Ferrari background image is
       * ~700 KB; it's bundled with the page so the layout swap is
       * instant when the user picks it from the menu. */
      const fetchBytes = async (url) => {
        try {
          const r = await fetch(url);
          return r.ok ? new Uint8Array(await r.arrayBuffer()) : null;
        } catch (_) { return null; }
      };
      const [rdmImgBytes, ferrariJson, ferrariBgBytes] = await Promise.all([
        fetchBytes('./RDM.rdmimg'),
        fetchBytes('./ferrari-layout.json'),
        fetchBytes('./Gemini_Generated_Image_f3rh.rdmimg'),
      ]);

      module = await factory({
        canvas,
        locateFile: (path) => path,   /* serve .wasm from same directory */
        print:    (msg) => console.log('[wasm]', msg),
        printErr: (msg) => console.log('[wasm-err]', msg),
        preRun: [function(Module) {
          try { Module.FS.mkdir('/lfs');         } catch (_) {}
          try { Module.FS.mkdir('/lfs/images');  } catch (_) {}
          try { Module.FS.mkdir('/lfs/layouts'); } catch (_) {}
          if (rdmImgBytes) {
            Module.FS.writeFile('/lfs/images/RDM.rdmimg', rdmImgBytes);
          }
          if (ferrariJson) {
            Module.FS.writeFile('/lfs/layouts/ferrari.json', ferrariJson);
          }
          if (ferrariBgBytes) {
            Module.FS.writeFile('/lfs/images/Gemini_Generated_Image_f3rh.rdmimg', ferrariBgBytes);
          }
        }],
      });

      /* Jump straight to the dashboard scene so the demo opens on the
       * product's actual main screen rather than the first-run wizard. */
      if (module._sandbox_set_scene) {
        module._sandbox_set_scene(SCENE_DASHBOARD);
      }

      /* JS-side synthetic drive cycle.
       *
       * The WASM has its own internal drive cycle (wizard_sandbox.c
       * `_dash_tick`) but it starts frozen by default and the unfreeze
       * function isn't in the JS export list of the current build. So
       * we drive the dash directly from JS by calling the signal-inject
       * entry point on a 60 ms interval (matches the C-side cadence).
       *
       * Cycle is a continuous accelerate-shift-redline loop covering
       * gears 1-6, intentionally lively so the homepage demo never
       * looks static. Sine-wave secondary signals add visual variation
       * without trying to simulate a real engine model. */
      try {
        const inject = module.cwrap('sandbox_inject_signal', null, ['string', 'number']);

        const PHASE_PULL_S    = 1.4;   // accelerate from current rpm to redline
        const PHASE_SHIFT_S   = 0.20;  // rpm drops on shift
        const CYCLE_GEARS     = 6;
        const REDLINE         = 7000;
        const POST_SHIFT_RPM  = 3200;
        const IDLE_RPM        = 1200;

        const t0 = performance.now();
        let phase = 'pull';
        let phaseStart = t0;
        let gear = 1;
        let pullRpmStart  = IDLE_RPM;
        let pullSpeed     = 0;
        const topSpeeds   = [55, 95, 140, 180, 220, 260];
        let pullSpeedStart = 0;

        const lerp = (a, b, k) => a + (b - a) * k;
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
        const wave  = (ms, c, amp, period, phaseMs) =>
          c + amp * Math.sin(((ms - phaseMs) / period) * 2 * Math.PI);

        function step() {
          const now = performance.now();
          const ms  = now - t0;
          const phaseMs = now - phaseStart;

          let rpm, speed, throttle;

          if (phase === 'pull') {
            const k = clamp(phaseMs / 1000 / PHASE_PULL_S, 0, 1);
            const eased = Math.pow(k, 1.6);
            rpm   = lerp(pullRpmStart,  REDLINE,                 eased);
            speed = lerp(pullSpeedStart, topSpeeds[gear - 1], k);
            throttle = 100;
            if (k >= 1) {
              if (gear < CYCLE_GEARS) {
                phase = 'shift';
                phaseStart = now;
              } else {
                phase = 'redline';
                phaseStart = now;
              }
            }
          } else if (phase === 'shift') {
            const k = clamp(phaseMs / 1000 / PHASE_SHIFT_S, 0, 1);
            rpm   = lerp(REDLINE, POST_SHIFT_RPM, k);
            speed = topSpeeds[gear - 1];
            throttle = lerp(100, 30, k);
            if (k >= 1) {
              gear += 1;
              pullRpmStart = POST_SHIFT_RPM;
              pullSpeedStart = topSpeeds[gear - 2];
              phase = 'pull';
              phaseStart = now;
            }
          } else { // 'redline' — hold at top of 6th, then reset
            const flickerOn = Math.floor(phaseMs / 80) % 2 === 0;
            rpm = flickerOn ? 7150 : 6900;
            speed = topSpeeds[CYCLE_GEARS - 1];
            throttle = 100;
            if (phaseMs > 1800) {
              gear = 1;
              pullRpmStart = IDLE_RPM;
              pullSpeedStart = 0;
              phase = 'pull';
              phaseStart = now;
            }
          }

          inject('RPM',             rpm);
          inject('VEHICLE_SPEED',   speed);
          inject('THROTTLE',        throttle);
          inject('GEAR',            gear);
          // Slow-moving secondary signals — give the cells some life.
          inject('COOLANT_TEMP',    82 + Math.min(ms / 40000, 5));
          inject('INTAKE_AIR_TEMP', wave(ms, 34, 6,    4200, 0));
          inject('LAMBDA',          wave(ms, 0.92, 0.08, 3100, 800));
          inject('OIL_TEMP',        wave(ms, 95, 5,    8000, 1500));
          inject('OIL_PRESSURE',    wave(ms, 380, 70,  2400, 400));
          inject('MAP',             wave(ms, 95, 40,   2000, 1100));
          inject('IGNITION',        wave(ms, 18, 6,    2800, 2300));
          inject('FUEL_TRIM',       wave(ms,  1.5, 2.0, 5500, 3000));
          inject('BATTERY_VOLTAGE', wave(ms, 13.8, 0.3, 9000, 0));
          inject('FUEL_PRESSURE',   wave(ms, 48,   2,   3600, 2000));
          /* Ferrari-layout signals (also harmless for the default layout
           * — unsubscribed signals are simply ignored by the registry). */
          inject('LAMBDA_TARGET',   wave(ms, 0.88, 0.04, 4000, 600));
          inject('LAMBDA_CORR_A',   wave(ms, 0.0,  3.5,  2700, 1700));
          /* Slowly draining fuel tank (resets every ~5 minutes) */
          inject('VIRTUAL_FUEL_TANK', 100 - ((ms / 1000) % 300) / 3);
          /* Frames per second — synthetic 70 Hz with mild jitter */
          inject('FPS',             70 + Math.sin(ms / 800) * 1.5);
        }
        // 60 ms cadence — matches the WASM's internal _dash_tick rate.
        setInterval(step, 60);
        step();
      } catch (err) {
        /* Non-fatal — even with no signals, the layout still renders
         * with "---" placeholders. */
        console.warn('drive cycle bootstrap failed:', err);
      }

      /* Per-frame tick. requestAnimationFrame matches display vsync,
       * which is typically 60 Hz — well above the firmware's 70 fps
       * target on the real LCD, so the demo looks at least as smooth
       * as the hardware. */
      const tick = () => {
        if (module && module._sandbox_step) module._sandbox_step();
        rafId = requestAnimationFrame(tick);
      };
      rafId = requestAnimationFrame(tick);

      /* Fade the loading state out (CSS transition handles the rest). */
      loading.classList.add('hidden');
    }

    /* ── Pointer forwarding ────────────────────────────────────────────
     * Translates browser pointer coordinates into the canvas's native
     * 800×480 pixel space and forwards to the WASM input driver.
     * Works for mouse, touch, and pen via the unified Pointer Events API. */
    function forwardPointer(ev, pressed) {
      if (!module || !module._sandbox_set_pointer) return;
      const rect = canvas.getBoundingClientRect();
      const x = ((ev.clientX - rect.left) * canvas.width)  / rect.width;
      const y = ((ev.clientY - rect.top)  * canvas.height) / rect.height;
      module._sandbox_set_pointer(Math.round(x), Math.round(y), pressed);
    }

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      forwardPointer(e, 1);
      e.preventDefault();
    });
    canvas.addEventListener('pointermove', (e) => {
      /* Only forward "move with button held" — saves a lot of cycles
       * when the user is just hovering. */
      if (e.buttons || e.pointerType === 'touch') forwardPointer(e, 1);
    });
    canvas.addEventListener('pointerup', (e) => {
      forwardPointer(e, 0);
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    canvas.addEventListener('pointercancel', (e) => forwardPointer(e, 0));
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    /* ── Lifecycle ─────────────────────────────────────────────────────
     * Pause the render loop when the iframe is hidden (parent tab in
     * background, or page scrolled past on mobile). Saves battery without
     * affecting first-load behaviour. */
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (rafId) cancelAnimationFrame(rafId);
      } else if (module) {
        const tick = () => {
          if (module._sandbox_step) module._sandbox_step();
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
      }
    });

    /* ── Entry point ──────────────────────────────────────────────────
     * Gate behind a user tap when ?gate=1 was set; otherwise just load. */
    if (useGate) {
      gate.classList.add('visible');
      gate.addEventListener('click', () => {
        gate.classList.remove('visible');
        loadWasm().catch((err) => {
          loading.textContent = 'Demo unavailable';
          console.error(err);
        });
      }, { once: true });
    } else {
      loadWasm().catch((err) => {
        loading.querySelector('.col').innerHTML = '<div>Demo unavailable</div>';
        console.error(err);
      });
    }
  </script>
</body>
</html>
